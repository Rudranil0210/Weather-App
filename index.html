<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="weather-app">
            <!-- Header -->
            <header class="header">
                <h1>Weather App</h1>
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
            </header>

            <!-- Search Section -->
            <div class="search-section">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Enter city name..." 
                        class="search-input"
                    >
                    <button class="search-btn" id="searchBtn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <button class="location-btn" id="locationBtn" title="Use my location">
                    <i class="fas fa-location-dot"></i> Current Location
                </button>
            </div>

            <!-- Loading Spinner -->
            <div class="spinner" id="spinner">
                <div class="spin"></div>
            </div>

            <!-- Current Weather -->
            <div class="weather-section" id="weatherSection" style="display: none;">
                <div class="current-weather">
                    <div class="weather-main">
                        <img id="weatherIcon" src="" alt="Weather Icon" class="weather-icon">
                        <div class="temperature-section">
                            <span id="temperature" class="temperature">--°C</span>
                            <span id="weatherDescription" class="description">--</span>
                        </div>
                    </div>
                    <div class="city-info">
                        <h2 id="cityName">--</h2>
                        <p id="dateTime">--</p>
                    </div>
                </div>

                <!-- Weather Details Grid -->
                <div class="weather-details-grid">
                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-water"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">Humidity</p>
                            <p id="humidity" class="detail-value">--%</p>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-wind"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">Wind Speed</p>
                            <p id="windSpeed" class="detail-value">-- m/s</p>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-eye"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">Visibility</p>
                            <p id="visibility" class="detail-value">-- km</p>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-gauge"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">Pressure</p>
                            <p id="pressure" class="detail-value">-- hPa</p>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-temperature-high"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">Feels Like</p>
                            <p id="feelsLike" class="detail-value">--°C</p>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-cloud-rain"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">Rain Chance</p>
                            <p id="rainChance" class="detail-value">--%</p>
                        </div>
                    </div>
                </div>

                <!-- Forecast Section -->
                <div class="forecast-section">
                    <h3>5-Day Forecast</h3>
                    <div class="forecast-container" id="forecastContainer">
                        <!-- Forecast cards will be inserted here -->
                    </div>
                </div>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <p id="errorText">Something went wrong. Please try again.</p>
            </div>

            <!-- Welcome Message -->
            <div class="welcome-message" id="welcomeMessage">
                <div class="welcome-content">
                    <i class="fas fa-cloud-sun"></i>
                    <h2>Welcome to Weather App</h2>
                    <p>Search for a city or use your current location to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
